<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow — a beautiful, powerful todo app to manage your tasks.">
  <title>{% block title %}TaskFlow{% endblock %} · TaskFlow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #0d0d1a;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.1);
      --accent: #7c6ff7;
      --accent-glow: rgba(124,111,247,0.35);
      --accent-2: #a78bfa;
      --text: #f0eeff;
      --text-muted: #8b8ba7;
      --success: #10b981;
      --danger: #f87171;
      --warning: #fbbf24;
      --low-color: #10b981;
      --medium-color: #fbbf24;
      --high-color: #f87171;
      --radius: 16px;
      --radius-sm: 8px;
      --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      --shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,111,247,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(167,139,250,0.12) 0%, transparent 60%);
      min-height: 100vh;
      color: var(--text);
      padding: 24px 16px 48px;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .page-wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Nav/Header ─────────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .app-logo .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .app-logo .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo-text span { color: var(--accent-2); }

    /* ── Glass Card ─────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }
    .btn-danger {
      background: rgba(248,113,113,0.15);
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.3);
    }
    .btn-danger:hover {
      background: rgba(248,113,113,0.25);
      transform: translateY(-2px);
    }
    .btn-ghost {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: var(--surface-hover);
      color: var(--text);
      transform: translateY(-2px);
    }
    .btn-success {
      background: rgba(16,185,129,0.15);
      color: var(--success);
      border: 1px solid rgba(16,185,129,0.3);
    }
    .btn-success:hover {
      background: rgba(16,185,129,0.25);
      transform: translateY(-2px);
    }
    .btn-icon {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
    }

    /* ── Form Inputs ─────────────────────────────────────── */
    .form-input, input[type="text"], input[type="date"], textarea, select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: var(--transition);
      outline: none;
    }
    .form-input:focus, input[type="text"]:focus, input[type="date"]:focus,
    textarea:focus, select:focus {
      border-color: var(--accent);
      background: rgba(124,111,247,0.1);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input::placeholder { color: var(--text-muted); }
    textarea { resize: vertical; min-height: 90px; }
    select option { background: #1a1a2e; color: var(--text); }

    /* ── Priority Badges ────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-low    { background: rgba(16,185,129,0.15);  color: var(--low-color); }
    .badge-medium { background: rgba(251,191,36,0.15);  color: var(--medium-color); }
    .badge-high   { background: rgba(248,113,113,0.15); color: var(--high-color); }

    /* ── Alerts / Messages ─────────────────────────────── */
    .alert {
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .alert-warning {
      background: rgba(251,191,36,0.12);
      border: 1px solid rgba(251,191,36,0.3);
      color: var(--warning);
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="page-wrap">

    <header class="app-header">
      <a href="{% url 'todo_list' %}" class="app-logo">
        <div class="logo-icon">✦</div>
        <span class="logo-text">Task<span>Flow</span></span>
      </a>
      <a href="{% url 'todo_create' %}" class="btn btn-primary" id="header-add-btn">
        <i class="fa-solid fa-plus"></i> New Task
      </a>
    </header>

    {% block content %}{% endblock %}

  </div>
</body>
</html>
